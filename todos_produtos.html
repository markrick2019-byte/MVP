<!DOCTYPE html>
<html lang="pt-br">
<head>
  <div id="head"></div>
  <title>Todos os Produtos</title>
</head>
<body data-base-path=".">
  <header><div id="header"></div></header>

  <main class="catalog-page">
    <section class="catalog-hero container-fluid">
      <p class="catalog-eyebrow">Catalogo completo</p>
      <h1>Todos os Produtos</h1>
      <p>Esta pagina reune os produtos iniciais do site e todos os itens cadastrados pelo formulario.</p>
    </section>

    <section id="section-vendidos" class="container-fluid" data-catalog-view="all">
      <div class="section-heading">
        <div>
          <p class="catalog-eyebrow">Catalogo geral</p>
          <h2>Todos os produtos cadastrados</h2>
        </div>
      </div>

      <div class="catalog-toolbar">
        <label class="catalog-search-field" for="catalog-search-input">
          <span>Buscar no catalogo</span>
          <input type="search" id="catalog-search-input" placeholder="Digite o nome, categoria ou descrição do produto">
        </label>

        <label class="catalog-sort-field" for="catalog-sort">
          <span>Ordenar vitrine</span>
          <select id="catalog-sort">
            <option value="destaque">Em destaque</option>
            <option value="mais-vendidos">Mais vendidos</option>
            <option value="az">Ordem alfabetica, A-Z</option>
            <option value="za">Ordem alfabetica, Z-A</option>
            <option value="menor-preco">Preco, do menor ao maior</option>
            <option value="maior-preco">Preco, do maior ao menor</option>
          </select>
        </label>
      </div>

      <p id="catalog-result-count" class="catalog-result-count"></p>
      <div class="card-group"></div>
      <p class="catalog-empty-message d-none">Nenhum produto encontrado. Ajuste a busca ou a ordenacao para tentar novamente.</p>
    </section>
  </main>

  <footer><div id="footer"></div></footer>
  <button id="voltar-topo" type="button" class="btn btn-outline-primary" onclick="topo()">&uarr; Voltar ao topo</button>
  <script src="js/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
    crossorigin="anonymous"></script>
</body>
</html>
